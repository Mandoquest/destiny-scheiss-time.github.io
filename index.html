<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Destiny 2 Season Timer</title>
  <link rel="icon" type="image/png" href="d2.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="bg-grid"></div>




  <div class="überschrift">
    <h1 class="idk">Destiny 2</h1>
    <h2 class="idk">Season Timer</h2> 
  </div>

  <div id="timer" class="timer">
    <div class="unit">
      <span id="days" class="value">--</span>
      <span class="label">DAYS</span>
    </div>
    <div class="separator">:</div>
    <div class="unit">
      <span id="hours" class="value">--</span>
      <span class="label">HOURS</span>
    </div>
    <div class="separator">:</div>
    <div class="unit">
      <span id="minutes" class="value">--</span>
      <span class="label">MINUTES</span>
    </div>
    <div class="separator">:</div>
    <div class="unit">
      <span id="seconds" class="value">--</span>
      <span class="label">SECONDS</span>
    </div>
  </div>

  <div id="error" class="error"></div>



  <div class="Buttonclass">
  <button class="bg-btn" onclick="nextBackground()">⬡</button>
  </div>


  <script>
    const themes = [
      {
        bg: "none",
        bodyClass: "theme-default"
      },
      {
        bg: "url('Art1.jpg')",
        bodyClass: "theme-red"
      },
      {
        bg: "url('Art2.jpg')",
        bodyClass: "theme-white"
      },
      {
        bg: "url('Art3.jpg')",
        bodyClass: "theme-white-dark-title"
      },
      {
        bg: "url('Art4.jpg')",
        bodyClass: "theme-white"
      }
    ];

    let bgIndex = 0;

    function nextBackground() {
      bgIndex = (bgIndex + 1) % themes.length;
      const theme = themes[bgIndex];

      // Alle theme-Klassen entfernen
      document.body.className = "";
      document.body.classList.add(theme.bodyClass);

      document.body.style.backgroundImage = theme.bg;
      document.body.style.backgroundSize = "cover";
      document.body.style.backgroundPosition = "center";
    ument.body.style.backgroundPosition = "center";
    }

    // Liest die lokale season.json — kein CORS-Problem
    async function fetchSeasonEnd() {
      try {
        const res = await fetch("season.json");
        if (!res.ok) throw new Error("season.json nicht gefunden");
        const data = await res.json();

        if (!data.seasonEnd) {
          document.getElementById("error").textContent = "Kein Enddatum verfügbar.";
          return;
        }

        startCountdown(new Date(data.seasonEnd));

      } catch (e) {
        document.getElementById("error").textContent = "Fehler: " + e.message;
      }
    }

    function startCountdown(endDate) {
      function update() {
        const diff = endDate - new Date();
        if (diff <= 0) {
          ["days","hours","minutes","seconds"].forEach(id =>
            document.getElementById(id).textContent = "00"
          );
          return;
        }
        document.getElementById("days").textContent    = String(Math.floor(diff / 86400000)).padStart(2,"0");
        document.getElementById("hours").textContent   = String(Math.floor((diff % 86400000) / 3600000)).padStart(2,"0");
        document.getElementById("minutes").textContent = String(Math.floor((diff % 3600000) / 60000)).padStart(2,"0");
        document.getElementById("seconds").textContent = String(Math.floor((diff % 60000) / 1000)).padStart(2,"0");
      }
      update();
      setInterval(update, 1000);
    }

    fetchSeasonEnd();
  </script>
</body>
</html>
